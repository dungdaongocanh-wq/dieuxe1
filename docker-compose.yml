version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dna_express_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dnaexpress
      POSTGRES_PASSWORD: dnaexpress123
      POSTGRES_DB: dna_express_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
